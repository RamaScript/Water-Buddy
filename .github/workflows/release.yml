name: Build and Release Apps

on:
  push:
    tags:
      - 'v*' # Trigger workflow on tags starting with v (e.g., v1.0.0)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            artifact_name: WaterBuddy-macOS
            asset_name: WaterBuddy-macOS.zip
            build_cmd: pyinstaller waterbuddy.spec --clean -y
            compress_cmd: |
              cd dist
              zip -r ../WaterBuddy-macOS.zip WaterBuddy.app
          - os: windows-latest
            artifact_name: WaterBuddy-Windows
            asset_name: WaterBuddy-Windows.zip
            build_cmd: pyinstaller waterbuddy.spec --clean -y
            compress_cmd: |
              cd dist
              Compress-Archive -Path WaterBuddy -DestinationPath ..\WaterBuddy-Windows.zip

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: ${{ matrix.build_cmd }}

    - name: Compress App
      run: ${{ matrix.compress_cmd }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/WaterBuddy-macOS/WaterBuddy-macOS.zip
          artifacts/WaterBuddy-Windows/WaterBuddy-Windows.zip
        generate_release_notes: true
